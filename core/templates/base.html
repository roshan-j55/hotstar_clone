<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hotstar Clone{% endblock %}</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Hotstar Inspired Dark Theme Palette */
            --bg-color: #0f1014;
            --surface-color: #1a1c22;
            --surface-hover: #ffffff1f;
            --text-primary: #ffffff;
            --text-secondary: #8f98b0;
            --accent-glow: rgba(0, 102, 255, 0.4);
            --gradient-primary: linear-gradient(90deg, #0250c5, #d43f8d);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 4rem;
            background: linear-gradient(180deg, rgba(15,16,20,0.9) 0%, rgba(15,16,20,0) 100%);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .navbar-brand {
            font-size: 1.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            text-decoration: none;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 3s infinite alternate;
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
        }

        .navbar-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .navbar-links a:hover {
            color: var(--text-primary);
        }

        /* Layout Container */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem 4rem;
        }

        /* Animations */
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(212, 63, 141, 0.2)); }
            100% { filter: drop-shadow(0 0 15px rgba(2, 80, 197, 0.5)); }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Hotstar Clone</a>
        <div class="navbar-links">
            <a href="/">Home</a>
            <a href="#">Movies</a>
            <a href="#">Sports</a>
            <a href="#">TV</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
